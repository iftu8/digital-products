name: Gemini AI Interaction Bot

on:
  issues:
    types: [opened]
  # চাইলে কমেন্টেও রিপ্লাই দেওয়ার জন্য নিচের দুই লাইন যুক্ত করতে পারেন (কমেন্ট সরাতে # মুছে দিন)
  # issue_comment:
  #   types: [created]

permissions:
  issues: write

jobs:
  gemini-reply:
    runs-on: ubuntu-latest
    
    # বট যেন নিজের কমেন্টে নিজে রিপ্লাই দিয়ে ইনফিনিট লুপ না করে
    if: github.event.sender.type != 'Bot'

    steps:
      - name: Generate and Post AI Reply
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              core.setFailed("❌ GEMINI_API_KEY GitHub Secrets-এ পাওয়া যায়নি!");
              return;
            }

            // ১. ইস্যুর টাইটেল এবং বডি (ইউজারের প্রশ্ন) সংগ্রহ করা
            const issueTitle = context.payload.issue.title;
            const userInput = context.payload.issue.body || "No description provided.";
            
            console.log(`Processing Issue: ${issueTitle}`);

            // ২. Gemini API-কে দেওয়ার জন্য প্রম্পট তৈরি করা
            const prompt = `You are a helpful AI assistant for a GitHub repository. Please answer the user based on their issue.\n\nIssue Title: ${issueTitle}\nUser Message: ${userInput}`;

            // ৩. Gemini API-তে রিকোয়েস্ট পাঠানো (Gemini 1.5 Flash মডেল ব্যবহার করে)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });

            if (!response.ok) {
              const errorData = await response.text();
              core.setFailed(`❌ API Error: ${errorData}`);
              return;
            }

            // ৪. রেসপন্স থেকে AI-এর টেক্সট বের করা
            const data = await response.json();
            const aiReply = data.candidates[0]?.content?.parts[0]?.text;

            if (!aiReply) {
              core.setFailed("❌ Gemini API থেকে কোনো উত্তর আসেনি!");
              return;
            }

            // ৫. GitHub ইস্যুর নিচে AI-এর রিপ্লাই কমেন্ট করা
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: aiReply
            });
