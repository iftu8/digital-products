name: Auto Code Generator

on:
  issues:
    types: [opened]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    # Ei workflow ta tokhoni cholbe jokhon issue er nam 'create-file:' diye shuru hobe
    if: startsWith(github.event.issue.title, 'create-file:')
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write the code for this.";
            
            // File er nam ta issue er title theke ber kore ana
            const fileName = issueTitle.replace('create-file:', '').trim();

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [{ text: `You are an expert programmer. Write the exact code for this request. DO NOT include markdown code blocks like \`\`\`python or any explanations. Return ONLY the raw code text so it can be directly saved into a file. Request: ${issueBody}` }]
                }]
              })
            });

            const data = await response.json();
            if (!response.ok) {
              console.error(data);
              throw new Error("API Error");
            }
            
            let generatedCode = data.candidates[0].content.parts[0].text;
            
            // Markdown tag thakle remove kore dewa
            generatedCode = generatedCode.replace(/^```[a-z]*\n/i, '').replace(/```$/i, '');

            // File ta toiri kora
            fs.writeFileSync(fileName, generatedCode);

            // GitHub Issue te comment kora
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Magic successful! AI apnar jnno \`${fileName}\` file ti auto-generate kore repository te add kore diyeche. Code tab e giye check korun!`
            });

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file by AI"
