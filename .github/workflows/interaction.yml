name: E-Book & Digital Product Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  build-product:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && (contains(github.event.issue.title, 'Generate') || contains(github.event.issue.title, 'Create')))
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Extended E-Book with Gemini Pro
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            // 🛑 Early API Key Check - Key না থাকলে প্রথমেই আটকে দেবে
            if (!process.env.GEMINI_API_KEY) {
              throw new Error("🚨 FATAL ERROR: GEMINI_API_KEY is missing! Please add it in GitHub Settings > Secrets and variables > Actions.");
            }
            
            let issueTitle, issueBody, issueNumber;
            
            if (context.eventName === 'workflow_dispatch') {
              issueTitle = "Generate: manual-ebook";
              issueBody = "Write a comprehensive guide on AI.";
              issueNumber = null;
            } else {
              issueTitle = context.payload.issue.title;
              issueBody = context.payload.issue.body || "Write the complete e-book based on the title.";
              issueNumber = context.payload.issue.number;
            }
            
            let cleanTitle = issueTitle.replace(/^Generate(.*?):/i, '').replace(/^Create(.*?):/i, '').trim();
            if (!cleanTitle) cleanTitle = 'digital-product-' + Date.now();
            const fileName = cleanTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.md';
            
            console.log(`Target filename: ${fileName}`);
            
            const payload = {
              contents: [{
                parts: [{ text: `You are an expert author, researcher, and content creator. The user wants you to write a complete, professional, and highly detailed digital product/e-book based on the following request.
                
                CRITICAL RULES:
                1. Write in clear, well-structured Markdown format. Use headings (#, ##, ###), bullet points, bold text, and formatting to make it look like a real e-book.
                2. Make it EXTENSIVE and detailed. Expand on topics deeply. Do not write short summaries.
                3. Return ONLY the raw markdown text of the book. Do not include introductory chatter like "Here is your book" or outro text. Just the book content.
                
                User Request: ${issueBody}` }]
              }],
              generationConfig: {
                temperature: 0.7 
              }
            };

            const modelsToTry = [
              "gemini-1.5-pro",
              "gemini-1.5-pro-latest",
              "gemini-1.5-flash",
              "gemini-pro", 
              "gemini-1.0-pro"
            ];
            
            let data;
            let success = false;
            let successfulModel = "";

            for (const modelName of modelsToTry) {
              if (success) break;
              
              console.log(`\n🔄 Initializing model: ${modelName}...`);
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
              
              const maxRetries = 3; 
              
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  console.log(`Attempt ${attempt} for ${modelName}...`);
                  const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });

                  data = await response.json();
                  
                  if (response.status === 503 || response.status === 429) {
                    const waitTime = attempt * 15000; 
                    console.warn(`⚠️ Server overloaded (${response.status}). Waiting ${waitTime/1000}s...`);
                    await new Promise(resolve => setTimeout(resolve, waitTime));
                    continue; 
                  }

                  if (!response.ok) {
                    console.error(`❌ API Error ${response.status} with ${modelName}: ${data.error?.message || 'Unknown'}`);
                    break; 
                  }

                  if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                    throw new Error("API did not return text.");
                  }
                  
                  success = true;
                  successfulModel = modelName;
                  break; 

                } catch (error) {
                  console.warn(`⚠️ Error on attempt ${attempt} with ${modelName}: ${error.message}`);
                  if (attempt === maxRetries) {
                    console.log(`⏭️ Moving to next fallback model...`);
                  } else {
                    await new Promise(resolve => setTimeout(resolve, 5000));
                  }
                }
              }
            }

            if (!success) {
               throw new Error("🚨 FATAL ERROR: All models and retries failed. Please check your API key validity and permissions.");
            }
            
            let generatedContent = data.candidates[0].content.parts[0].text;
            
            generatedContent = generatedContent.replace(/^```markdown\s*\n/i, '');
            generatedContent = generatedContent.replace(/\n```\s*$/i, '');
            generatedContent = generatedContent.trim();

            fs.writeFileSync(fileName, generatedContent);
            console.log(`✅ Successfully created file: ${fileName} using ${successfulModel}`);

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ **Extended Digital Product Generated Successfully!** \n\nYour comprehensive file \`${fileName}\` has been carefully created using \`${successfulModel}\` and pushed to the repository.`
              });
            }

      - name: Commit and Push E-Book
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "📚 Auto-generated Extended E-Book via Gemini API"
            git push
          fi
