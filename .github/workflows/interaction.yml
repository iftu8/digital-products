name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch: # অ্যাকশন ট্যাব থেকে ম্যানুয়ালি রি-রান করার জন্য

jobs:
  generate-code:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'create-file:')
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini 2.5
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write a basic script.";
            
            // ফাইল এর নাম এক্সট্রাক্ট করা
            const fileName = issueTitle.replace('create-file:', '').trim();

            // ২০২৬ সালের সবচেয়ে আপডেটেড এবং সুপার-ফাস্ট মডেল
            const modelName = "gemini-2.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            try {
              console.log(`Calling Gemini API for file: ${fileName}...`);
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: `You are an expert production-grade software engineer. Write the exact source code for this request. 
                    CRITICAL RULES:
                    1. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`javascript, or \`\`\`).
                    2. DO NOT include any explanations, introduction, or outro text.
                    3. Return ONLY the raw code text so it can be directly saved into a file.
                    
                    Request: ${issueBody}` }]
                  }]
                })
              });

              const data = await response.json();
              
              if (!response.ok) {
                console.error("Gemini API Error Details:", JSON.stringify(data, null, 2));
                throw new Error(`API returned status ${response.status}: ${data.error?.message || 'Unknown Error'}`);
              }

              if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                throw new Error("API did not return any text. It might be blocked by safety settings or empty prompt.");
              }
              
              let generatedCode = data.candidates[0].content.parts[0].text;
              
              // ব্যাকআপ ক্লিনআপ: এআই ভুল করে ব্যাকটিক্স (```) দিলে তা রিমুভ করার জন্য শক্তিশালী রেজেক্স
              generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
              generatedCode = generatedCode.replace(/\n```\s*$/i, '');
              generatedCode = generatedCode.trim();

              // ফাইল রাইট করা
              fs.writeFileSync(fileName, generatedCode);
              console.log(`Successfully created file: ${fileName}`);

              // সাকসেস কমেন্ট পোস্ট করা
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **Magic successful!** AI (\`${modelName}\`) আপনার জন্য \`${fileName}\` ফাইলটি সাকসেসফুলি জেনারেট করে রিপোজিটরিতে অ্যাড করে দিয়েছে। কোড ট্যাবটি চেক করে দেখুন!`
              });

            } catch (error) {
              console.error("Execution failed:", error);
              // এরর হলে কমেন্টে ডিটেইলস দেওয়া
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Error Occurred!** কোড জেনারেট করার সময় একটি সমস্যা হয়েছে।\n**Error Message:** \`${error.message}\`\n\n*দয়া করে আপনার GEMINI_API_KEY চেক করুন।*`
              });
              core.setFailed(error.message);
            }

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file by Gemini 2.5 AI [skip ci]"
