name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini API
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write the exact code for this.";
            
            // File name auto-formatting
            let fileName = issueTitle.replace(/\[.*?\]/g, '').replace('create-file:', '').trim();
            fileName = fileName.replace(/[^a-zA-Z0-9.\-_]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').toLowerCase();
            
            if (!fileName || fileName === '-') fileName = `auto-generated-${context.issue.number}.md`;
            else if (!fileName.includes('.')) fileName += '.md'; 
            
            // 🔥 CRITICAL FIX: Google-er ekdom stable model '1.5-flash' deya holo jate 100% kaaj kore
            const modelName = "gemini-1.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            const payload = {
              contents: [{
                parts: [{ text: `You are an expert production-grade software engineer. Write the exact source code for this request. 
                CRITICAL RULES:
                1. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`javascript, or \`\`\`).
                2. DO NOT include any explanations, introduction, or outro text.
                3. Return ONLY the raw code text so it can be directly saved into a file.
                
                Request: ${issueBody}` }]
              }]
            };

            let data;
            let success = false;
            // 🔥 FIX: 10 bar retry korar system jate kono bhabei fail na hoy
            const maxRetries = 10; 

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                console.log(`Attempt ${attempt}: Calling Gemini API for ${fileName}...`);
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                data = await response.json();
                
                // 🔥 FIX: Server load thakle 30 seconds opekha korbe
                if (response.status === 503) {
                  console.warn(`⚠️ Server Overloaded (503). Attempt ${attempt} failed. Waiting 30 seconds...`);
                  await new Promise(resolve => setTimeout(resolve, 30000));
                  continue; 
                }

                if (!response.ok) {
                  throw new Error(`API Error ${response.status}: ${data.error?.message || 'Unknown'}`);
                }

                if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                  throw new Error("API did not return text. Check prompt or safety settings.");
                }
                
                success = true;
                break;

              } catch (error) {
                if (attempt === maxRetries) {
                  throw error;
                }
                console.warn(`⚠️ Attempt ${attempt} failed: ${error.message}. Retrying in 15 seconds...`);
                await new Promise(resolve => setTimeout(resolve, 15000));
              }
            }

            if (!success) {
               throw new Error("Failed to generate code after maximum retries.");
            }
            
            let generatedCode = data.candidates[0].content.parts[0].text;
            
            // Clean up unnecessary markdown formatting from AI output
            generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
            generatedCode = generatedCode.replace(/\n```\s*$/i, '');
            generatedCode = generatedCode.trim();

            // File toiri kora
            fs.writeFileSync(fileName, generatedCode);
            console.log(`✅ Successfully created file: ${fileName}`);

            // Issue te comment kora
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Task Completed!**\n\nThe AI has successfully generated the code and created the file: \`${fileName}\`. It is being committed to the repository now.`
            });
            
            core.exportVariable('GENERATED_FILENAME', fileName);

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GENERATED_FILENAME }}"
          git commit -m "Auto-generated file: ${{ env.GENERATED_FILENAME }}" || echo "No changes to commit"
          git push
