name: Auto Code Generator

on:
  issues:
    types: [opened]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Code with Gemini AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            // Issue details কালেক্ট করা
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write code for this request.";
            
            // ১. স্মার্টলি ফাইলের নাম ডিটেক্ট করা (create-file: থাকলেও কাজ করবে, না থাকলেও অটো নাম নেবে)
            let fileName = "solution.py";
            if (issueTitle.toLowerCase().includes('create-file:')) {
              fileName = issueTitle.replace(/create-file:/i, '').trim();
            } else {
              fileName = issueTitle.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') + '.py';
            }
            if (!fileName || fileName === '.py') fileName = 'generated_code.py';

            // ২. API Key থেকে সব হিডেন স্পেস বা নিউলাইন ক্লিন করা (.trim)
            const rawKey = process.env.GEMINI_API_KEY || "";
            const apiKey = rawKey.trim();
            
            if (!apiKey) {
              core.setFailed("❌ Error: GEMINI_API_KEY secret is missing in repository settings!");
              return;
            }

            // ৩. একদম স্টেবল এবং লেটেস্ট অফিশিয়াল প্রোডাকশন মডেল ব্যবহার করা
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            // AI-কে কড়া নির্দেশনা যাতে সে শুধু র-কোড (raw code) দেয়
            const prompt = `You are an expert programmer. Write the complete, raw, production-ready source code for this request. 
            DO NOT wrap the code in markdown blocks like \`\`\`python. 
            DO NOT write any introduction, conversational text, or explanation. 
            Return ONLY the raw executable lines of code. 
            
            Request Details:
            Title: ${issueTitle}
            Body: ${issueBody}`;

            try {
              console.log("Connecting to Gemini API...");
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });

              if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API returned status ${response.status}: ${errText}`);
              }

              const data = await response.json();
              let code = data.candidates[0].content.parts[0].text;
              
              // ৪. সেফটি ফিল্টার: এআই যদি ভুল করেও markdown কোড ব্লক দেয়, তা রিমুভ করা
              code = code.replace(/^```[a-z]*\n/i, '').replace(/```$/i, '').trim();
              
              // ৫. ফাইলটি সরাসরি রিপোজিটরিতে সেভ করা
              fs.writeFileSync(fileName, code);
              console.log(`Successfully saved code to ${fileName}`);
              
              // ৬. সাকসেস মেসেজ দিয়ে কমেন্ট করা
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **Magic Successful!** Gemini AI আপনার জন্য \`${fileName}\` ফাইলটি অটো-জেনারেট করে রিপোজিটরিতে যোগ করে দিয়েছে। কোড ট্যাবে গিয়ে চেক করুন!`
              });

            } catch (error) {
              core.setFailed(`Workflow Failed: ${error.message}`);
            }

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-generated file by AI via Issue"
