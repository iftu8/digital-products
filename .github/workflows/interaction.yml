name: Auto Code Generator

on:
  issues:
    types: [opened, edited] # ইস্যু এডিট করলেও যেন অটো রি-রান হয়
  workflow_dispatch: # অ্যাকশন ট্যাব থেকে ম্যানুয়ালি রি-রান করার জন্য

jobs:
  generate-code:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'create-file:')
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini 3.5 AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write the code for this.";
            
            // ফাইল এর নাম টাইটেল থেকে এক্সট্রাক্ট করা
            const fileName = issueTitle.replace('create-file:', '').trim();

            // লেটেস্ট 'gemini-3.5-flash' মডেল ব্যবহার করা হচ্ছে
            const modelName = "gemini-3.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: `You are an expert programmer. Write the exact source code for this request. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`js or \`\`\`), do not include explanations, intro, or outro text. Return ONLY the raw code text so it can be directly saved into a file. Request: ${issueBody}` }]
                  }]
                })
              });

              const data = await response.json();
              
              if (!response.ok) {
                console.error("Gemini API Error Details:", JSON.stringify(data, null, 2));
                throw new Error(`API returned status ${response.status}: ${data.error?.message || 'Unknown API Error'}`);
              }

              if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                console.error("Invalid API Structure:", JSON.stringify(data, null, 2));
                throw new Error("API did not return text. It might be blocked by safety settings.");
              }
              
              let generatedCode = data.candidates[0].content.parts[0].text;
              
              // অ্যাডভান্সড ক্লিনআপ: ব্যাকটিক্স (```) বা অপ্রয়োজনীয় মার্কডাউন ট্যাগ নিখুঁতভাবে রিমুভ করা
              generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
              generatedCode = generatedCode.replace(/\n```\s*$/i, '');
              generatedCode = generatedCode.trim();

              // ফাইল তৈরি ও রাইট করা
              fs.writeFileSync(fileName, generatedCode);
              console.log(`Successfully created file: ${fileName}`);

              // সাকসেস মেসেজ কমেন্ট করা
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **Magic successful!** AI (\`gemini-3.5-flash\`) আপনার জন্য \`${fileName}\` ফাইলটি সাকসেসফুলি জেনারেট করে রিপোজিটরিতে অ্যাড করে দিয়েছে। কোড ট্যাবটি চেক করে দেখুন!`
              });

            } catch (error) {
              console.error("Execution failed:", error);
              // কোনো এরর হলে তা সরাসরি ইস্যুর কমেন্টে জানিয়ে দেবে
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Error Occurred!** কোড জেনারেট করার সময় একটি সমস্যা হয়েছে।\n**Error Message:** \`${error.message}\``
              });
              core.setFailed(error.message);
            }

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file by Gemini 3.5 AI [skip ci]"
