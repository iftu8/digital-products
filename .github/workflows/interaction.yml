name: Gemini AI Interaction Bot

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  gemini-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and Post AI Reply
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "No description provided.";
            const user = context.payload.issue.user.login;

            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              console.log("Error: API Key missing in GitHub Secrets!");
              return;
            }

            const prompt = `You are a helpful AI assistant managing a GitHub repository. A user named @${user} opened an issue titled: "${issueTitle}". The description is: "${issueBody}". Write a friendly, helpful, and concise response thanking them and answering their query.`;

            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });

              const data = await res.json();
              
              // ১. যদি API Key ভুল থাকে বা কোনো Error আসে, তবে এখানে ধরা পড়বে
              if (data.error) {
                console.error("🚨 Gemini API Error Details:\n", JSON.stringify(data.error, null, 2));
                return; 
              }

              // ২. যদি সফলভাবে রিপ্লাই জেনারেট হয়
              if (data.candidates && data.candidates.length > 0) {
                const aiReply = data.candidates[0].content.parts[0].text;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: aiReply
                });
                console.log("✅ Successfully posted the AI reply!");
              } else {
                console.error("⚠️ No AI reply generated. Raw data:\n", JSON.stringify(data, null, 2));
              }
            } catch (error) {
              console.error("Fetch Request Failed: ", error);
            }
