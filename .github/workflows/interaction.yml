name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch: # Jate action tab theke manually re-run kora jay

jobs:
  generate-code:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'create-file:')
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "Write the code for this.";
            
            // File er nam ber kora
            const fileName = issueTitle.replace('create-file:', '').trim();

            // Ekdom stable ar updated model use kora hocche
            const modelName = "gemini-1.5-flash"; 
            
            // v1beta er bodole ekdom official 'v1' endpoint use kora holo jate 404 error na ashe
            const url = `https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: `You are an expert programmer. Write the exact source code for this request. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`js or \`\`\`), do not include explanations, intro, or outro text. Return ONLY the raw code text so it can be directly saved into a file. Request: ${issueBody}` }]
                  }]
                })
              });

              const data = await response.json();
              
              if (!response.ok) {
                console.error("API Error Details:", JSON.stringify(data, null, 2));
                throw new Error(`API Error: ${data.error?.message || response.status}`);
              }

              if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                throw new Error("API did not return text. Check prompt or safety settings.");
              }
              
              let generatedCode = data.candidates[0].content.parts[0].text;
              
              // Clean-up markdown formats jate file perfectly run kore
              generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
              generatedCode = generatedCode.replace(/\n```\s*$/i, '');
              generatedCode = generatedCode.trim();

              // File toiri kora
              fs.writeFileSync(fileName, generatedCode);
              console.log(`Successfully created file: ${fileName}`);

              // GitHub e comment kora
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **Magic successful!** AI (\`${modelName}\`) apnar jonno \`${fileName}\` file ti auto-generate kore repository te add kore diyeche. Code tab e giye check korun!`
              });

            } catch (error) {
              console.error("Execution failed:", error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Error Occurred!** Code generate korar somoy problem hoyeche.\n**Error:** \`${error.message}\``
              });
              core.setFailed(error.message);
            }

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file by AI [skip ci]"
