name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      filename:
        description: 'File name to create (e.g., script.py)'
        required: false
        default: 'generated_file.txt'
      prompt:
        description: 'What do you want to build?'
        required: false
        default: 'Write a basic hello world program'

jobs:
  generate-code:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && startsWith(github.event.issue.title, 'create-file:'))
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini API (Auto-Fallback)
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            let issueTitle, issueBody, issueNumber;
            
            if (context.eventName === 'workflow_dispatch') {
              issueTitle = `create-file: ${context.payload.inputs?.filename || 'manual_file.txt'}`;
              issueBody = context.payload.inputs?.prompt || "Write the code for this request.";
              issueNumber = null;
            } else {
              issueTitle = context.payload.issue.title;
              issueBody = context.payload.issue.body || "Write the code for this request.";
              issueNumber = context.payload.issue.number;
            }
            
            const fileName = issueTitle.replace('create-file:', '').trim();
            
            const payload = {
              contents: [{
                parts: [{ text: `You are an expert production-grade software engineer. Write the exact source code for this request. 
                CRITICAL RULES:
                1. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`javascript, or \`\`\`).
                2. DO NOT include any explanations, introduction, or outro text.
                3. Return ONLY the raw code text so it can be directly saved into a file.
                
                Request: ${issueBody}` }]
              }],
              generationConfig: {
                temperature: 0.2 
                // Removed maxOutputTokens to prevent API crashes on older or different models
              }
            };

            // 🌟 UPDATED INDESTRUCTIBLE MULTI-MODEL FALLBACK 🌟
            // Added exactly versioned models to bypass the 404 "Not Found" Google API error
            const modelsToTry = [
              "gemini-1.5-flash-latest",
              "gemini-1.5-flash-001",
              "gemini-1.0-pro-latest",
              "gemini-1.0-pro"
            ];
            
            let data;
            let success = false;
            let successfulModel = "";

            for (const modelName of modelsToTry) {
              if (success) break;
              
              console.log(`\n🔄 Initializing model: ${modelName}...`);
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
              
              const maxRetries = 3;
              
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  console.log(`Attempt ${attempt} for ${modelName}...`);
                  const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });

                  data = await response.json();
                  
                  if (response.status === 503 || response.status === 429) {
                    const waitTime = attempt * 10000; 
                    console.warn(`⚠️ Server overloaded (${response.status}). Waiting ${waitTime/1000}s...`);
                    await new Promise(resolve => setTimeout(resolve, waitTime));
                    continue; 
                  }

                  if (!response.ok) {
                    console.error(`❌ API Error ${response.status} with ${modelName}: ${data.error?.message || 'Unknown'}`);
                    break; // Move immediately to the next fallback model
                  }

                  if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                    throw new Error("API did not return text. Check safety settings.");
                  }
                  
                  success = true;
                  successfulModel = modelName;
                  break; 

                } catch (error) {
                  console.warn(`⚠️ Error on attempt ${attempt} with ${modelName}: ${error.message}`);
                  if (attempt === maxRetries) {
                    console.log(`⏭️ Moving to next fallback model...`);
                  } else {
                    await new Promise(resolve => setTimeout(resolve, 5000));
                  }
                }
              }
            }

            if (!success) {
               throw new Error("🚨 FATAL ERROR: All models and retries failed. Please check your API key permissions.");
            }
            
            let generatedCode = data.candidates[0].content.parts[0].text;
            
            generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
            generatedCode = generatedCode.replace(/\n```\s*$/i, '');
            generatedCode = generatedCode.trim();

            fs.writeFileSync(fileName, generatedCode);
            console.log(`✅ Successfully created file: ${fileName} using ${successfulModel}`);

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ **Success!** \n\nFile \`${fileName}\` has been generated accurately using \`${successfulModel}\` and automatically pushed to the repository.`
              });
            }

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "🚀 Auto-generated code via robust Gemini API"
            git push
          fi
