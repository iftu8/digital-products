name: Ultimate Auto AI Generator

on:
  issues:
    types: [opened]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Content with Ultra AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title || "Untitled Issue";
            const issueBody = context.payload.issue.body || "Please generate the most comprehensive code or documentation for this project.";

            // স্মার্ট ফাইল নেম ডিটেকশন (যেকোনো ইস্যু থেকে অটোমেটিক ফাইলের নাম বুঝবে)
            let fileName = "README.md";
            if (issueTitle.includes(':')) {
              // যদি 'Task: app.py' বা 'Create: index.html' টাইপের কিছু দেন
              fileName = issueTitle.split(':')[1].trim();
            } else if (issueTitle.match(/\.[a-zA-Z0-9]+$/)) {
              // যদি টাইটেলে সরাসরি '.py', '.js', '.md' থাকে
              const words = issueTitle.split(' ');
              fileName = words[words.length - 1].trim();
            }
            
            // ফাইলের নামে কোনো অবৈধ ক্যারেক্টার থাকলে ক্লিন করা
            fileName = fileName.replace(/[^a-zA-Z0-9.\-_]/g, '');
            if (!fileName) fileName = "README.md";

            // লেটেস্ট এবং ম্যাক্সিমাম পাওয়ারফুল এন্ডপয়েন্ট
            const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY;

            // আল্ট্রা-ম্যাক্স প্রম্পট (AI কে একদম সেরা আউটপুট দিতে বাধ্য করবে)
            const promptText = `You are an Ultimate AI Expert Engineer. I will give you a request. 
            You must generate an EXTREMELY EXTENDED, highly detailed, production-ready output for the file: "` + fileName + `".
            
            Issue Title: ` + issueTitle + `
            Issue Body: ` + issueBody + `
            
            CRITICAL INSTRUCTIONS:
            1. If it is a code file (e.g., Python, JS, HTML), write the complete, fully functional, and bug-free code. Add advanced features, error handling, and rich comments. Do NOT leave any part incomplete.
            2. If it is documentation or a generic request, generate a massively detailed markdown format with beautiful structure, modern badges, feature lists, step-by-step guides, and explanations. Expand every single point to its absolute limit.
            3. STRICT OUTPUT RULE: Return ONLY the raw content to be saved directly into the file. Do NOT wrap the entire response in markdown code blocks (like \`\`\`python). Do NOT add greetings or explanations outside the file content.`;

            // API কল (Maximum Token & Precision)
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: {
                  maxOutputTokens: 8192, // একদম সর্বোচ্চ আউটপুট লিমিট
                  temperature: 0.3       // কোড এবং লেখার কোয়ালিটি নিখুঁত রাখার জন্য
                }
              })
            });

            const data = await response.json();
            if (!response.ok) {
              console.error("API Error Details:", JSON.stringify(data, null, 2));
              throw new Error("API Error: Token problem or endpoint failure.");
            }

            let generatedContent = data.candidates[0].content.parts[0].text;
            
            // AI এরর করে ব্যাকটিক (```) দিলে তা অটোমেটিক ক্লিন করা
            generatedCode = generatedContent.replace(/^
```[a-z]*\n/i, '').replace(/```\s*$/, '').trim();

            // রিপোজিটরিতে ফাইল সেভ করা
            fs.writeFileSync(fileName, generatedCode);

            // সাকসেস মেসেজ কমেন্ট করা
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🎉 **Ultimate Magic Successful!**\n\nAI has automatically analyzed your issue and created/updated the file `" + fileName + "` with highly extended and professional content. Check the code repository!"
            });

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated maximum output by AI"
