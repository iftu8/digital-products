name: Generate Smart AI Reply

on:
  issue_comment:
    types: [created]

jobs:
  process-ai-reply:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Set up job
        run: echo "Starting AI Action..."

      - name: Process Input & Call Gemini API
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const commentBody = context.payload.comment.body;
            
            console.log(`Processing Comment on Issue: #${issueNumber}`);
            
            if (!process.env.GEMINI_API_KEY) {
              core.setFailed("Error: GEMINI_API_KEY not found in secrets.");
              return;
            }

            // Ekhane ekdom sothik ebong supported model use kora hoyeche
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: `You are an AI assistant. Please provide a smart, helpful, and concise response to this GitHub issue comment: "${commentBody}"` }]
                  }]
                })
              });

              const data = await response.json();
              
              if (!response.ok) {
                console.error("API Error Details:", JSON.stringify(data, null, 2));
                throw new Error(`Status ${response.status}: ${data.error?.message || 'Unknown API Error'}`);
              }

              const aiReply = data.candidates[0].content.parts[0].text;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: aiReply
              });
              
              console.log("Success: AI Reply posted!");

            } catch (error) {
              core.setFailed(`Workflow failed: ${error.message}`);
            }
