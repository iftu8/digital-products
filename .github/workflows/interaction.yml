name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  generate-code:
    runs-on: ubuntu-latest
    # ফিক্স: ম্যানুয়ালি রান করলে অথবা ইস্যু টাইটেল মিললে তবেই রান করবে
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'create-file:')
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini 3.5 Flash
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            // ফিক্স: ম্যানুয়ালি রান করলে এরর না দিয়ে ডিফল্ট টেস্ট ফাইল বানাবে (?.) ব্যবহার করে
            const issueTitle = context.payload.issue?.title || "create-file: test_manual.txt";
            const issueBody = context.payload.issue?.body || "Write a simple Hello World in Python.";
            
            const fileName = issueTitle.replace('create-file:', '').trim();
            
            // Upgraded to Gemini 3.5 Flash for maximum accuracy and error-free output
            const modelName = "gemini-3.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            const payload = {
              contents: [{
                parts: [{ text: `You are an expert production-grade software engineer. Write the exact source code for this request. 
                CRITICAL RULES:
                1. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`javascript, or \`\`\`).
                2. DO NOT include any explanations, introduction, or outro text.
                3. Return ONLY the raw code text so it can be directly saved into a file.
                
                Request: ${issueBody}` }]
              }]
            };

            let data;
            let success = false;
            const maxRetries = 3;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                console.log(`Attempt ${attempt}: Calling Gemini 3.5 Flash API for ${fileName}...`);
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                data = await response.json();
                
                // 503 error handled securely
                if (response.status === 503) {
                  console.warn("⚠️ Server is currently overloaded (503). Waiting 10 seconds before retrying...");
                  await new Promise(resolve => setTimeout(resolve, 10000));
                  continue; 
                }

                if (!response.ok) {
                  throw new Error(`API Error ${response.status}: ${data.error?.message || 'Unknown'}`);
                }

                if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                  throw new Error("API did not return text. Check prompt or safety settings.");
                }
                
                success = true;
                break;

              } catch (error) {
                if (attempt === maxRetries) {
                  throw error;
                }
                console.warn(`⚠️ Attempt ${attempt} failed: ${error.message}. Retrying in 5 seconds...`);
                await new Promise(resolve => setTimeout(resolve, 5000));
              }
            }

            if (!success) {
               throw new Error("Failed to generate code after maximum retries due to server overload.");
            }
            
            let generatedCode = data.candidates[0].content.parts[0].text;
            
            // Clean-up any unexpected markdown formatting
            generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
            generatedCode = generatedCode.replace(/\n
```\s*$/i, '');
            generatedCode = generatedCode.trim();

            // File create step
            fs.writeFileSync(fileName, generatedCode);
            console.log(`✅ Successfully created file: ${fileName}`);

            // Comment on github issue (ফিক্স: ম্যানুয়াল রানে ইস্যু নাম্বার থাকে না, তাই চেক করে নেওয়া হলো)
            if (context.issue?.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **Magic successful!** Frontier Model **Gemini 3.5 Flash** apnar jonno \`${fileName}\` file ti successfully high-quality formatting e generate kore repository te add kore diyeche. Code tab e check korun!`
              });
            } else {
              console.log("ℹ️ Manual run detected. Skipping issue comment.");
            }

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file by Gemini 3.5 Flash [skip ci]"
