name: Ultimate Auto AI Generator

on:
  issues:
    types: [opened]

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Content with Gemini AI
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "";
            
            // System prompt to force it to generate maximum output/code perfectly
            const prompt = `You are an expert Python developer. Based on the following GitHub issue request, generate a fully functional, high-quality, and complete Python Snake Game code. Make sure to include all logic and maximize the output detail.\n\nIssue Title: ${issueTitle}\nIssue Description: ${issueBody}`;
            
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              core.setFailed("Error: GEMINI_API_KEY secret is missing! Please add it in Repository Settings -> Secrets.");
              return;
            }

            // Correct URL format to avoid 'Failed to parse URL' error
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
              const response = await fetch(url, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: prompt }]
                  }]
                })
              });

              if (!response.ok) {
                const errorText = await response.text();
                core.setFailed(`Gemini API Error: ${response.status} - ${errorText}`);
                return;
              }

              const data = await response.json();
              
              if (!data.candidates || data.candidates.length === 0) {
                core.setFailed("Gemini API did not return any candidates.");
                return;
              }
              
              const generatedText = data.candidates[0].content.parts[0].text;

              // Reply back to the GitHub Issue with the generated Python Code
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `### 🐍 Generated Python Snake Game Code:\n\n${generatedText}`
              });

              console.log("Successfully generated code and commented on issue!");

            } catch (error) {
              core.setFailed(`Workflow failed with error: ${error.message}`);
            }
