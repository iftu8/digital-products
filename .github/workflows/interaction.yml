name: Auto Code Generator

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      filename:
        description: 'File name to create (e.g., script.py)'
        required: false
        default: 'generated_file.txt'
      prompt:
        description: 'What do you want to build?'
        required: false
        default: 'Write a basic hello world program'

jobs:
  generate-code:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && startsWith(github.event.issue.title, 'create-file:'))
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini 3.5 Flash
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            let issueTitle, issueBody, issueNumber;
            
            if (context.eventName === 'workflow_dispatch') {
              issueTitle = `create-file: ${context.payload.inputs?.filename || 'manual_file.txt'}`;
              issueBody = context.payload.inputs?.prompt || "Write the code for this request.";
              issueNumber = null;
            } else {
              issueTitle = context.payload.issue.title;
              issueBody = context.payload.issue.body || "Write the code for this request.";
              issueNumber = context.payload.issue.number;
            }
            
            const fileName = issueTitle.replace('create-file:', '').trim();
            
            const modelName = "gemini-3.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${process.env.GEMINI_API_KEY}`;
            
            const payload = {
              contents: [{
                parts: [{ text: `You are an expert production-grade software engineer. Write the exact source code for this request. 
                CRITICAL RULES:
                1. DO NOT include any markdown code blocks (like \`\`\`python, \`\`\`javascript, or \`\`\`).
                2. DO NOT include any explanations, introduction, or outro text.
                3. Return ONLY the raw code text so it can be directly saved into a file.
                
                Request: ${issueBody}` }]
              }],
              generationConfig: {
                maxOutputTokens: 8192,
                temperature: 0.2 
              }
            };

            let data;
            let success = false;
            const maxRetries = 4;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                console.log(`Attempt ${attempt}: Calling ${modelName} API for ${fileName}...`);
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                data = await response.json();
                
                if (response.status === 503 || response.status === 429) {
                  const waitTime = attempt * 5000;
                  console.warn(`⚠️ Server overloaded (${response.status}). Waiting ${waitTime/1000}s before retry...`);
                  await new Promise(resolve => setTimeout(resolve, waitTime));
                  continue; 
                }

                if (!response.ok) {
                  throw new Error(`API Error ${response.status}: ${data.error?.message || 'Unknown'}`);
                }

                if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
                  throw new Error("API did not return text. Check prompt or safety settings.");
                }
                
                success = true;
                break;

              } catch (error) {
                if (attempt === maxRetries) {
                  throw error;
                }
                console.warn(`⚠️ Attempt ${attempt} failed: ${error.message}. Retrying...`);
                await new Promise(resolve => setTimeout(resolve, 4000));
              }
            }

            if (!success) {
               throw new Error("❌ Failed to generate code after maximum retries due to server overload.");
            }
            
            let generatedCode = data.candidates[0].content.parts[0].text;
            
            generatedCode = generatedCode.replace(/^```[a-zA-Z0-9+#-]*\s*\n/i, '');
            generatedCode = generatedCode.replace(/\n```\s*$/i, '');
            generatedCode = generatedCode.trim();

            fs.writeFileSync(fileName, generatedCode);
            console.log(`✅ Successfully created file: ${fileName}`);

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ **Success!** \n\nFile \`${fileName}\` has been generated accurately using \`${modelName}\` and automatically pushed to the repository.`
              });
            }

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "🚀 Auto-generated code via Gemini 3.5 Flash API"
            git push
          fi
