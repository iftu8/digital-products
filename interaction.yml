name: Interaction API Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull_requests: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Respond to Issue or PR
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.payload.issue;
            const issueNumber = isIssue ? context.payload.issue.number : context.payload.pull_request.number;
            const user = isIssue ? context.payload.issue.user.login : context.payload.pull_request.user.login;
            
            // Apni chaile niche apnar moton message bodle nite paren
            const message = `Hi @${user}! 👋\n\nThank you for interacting with this repository! Our automated Extended Interaction API has successfully logged your request. A maintainer will review your ${isIssue ? 'issue' : 'pull request'} shortly.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: message
            });
